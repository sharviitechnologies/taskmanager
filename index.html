<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sharvii Technologies — Task Manager</title>

  <script>
    // These are your specific keys - do not change them
    const SUPABASE_URL = "https://aagztfgkthgpysrlyksa.supabase.co";
    const SUPABASE_KEY = "sb_publishable_dCYu2aNVBG2DIIeIC_hwdw_p18eQsa5";
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #f4f6fb; --surface: #ffffff; --border: #e4e9f2; --text: #0d1b2e;
      --indigo: #4361ee; --violet: #7c3aed; --red: #dc2626; --green: #059669;
      --sidebar-w: 260px; --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Layout ── */
    #app { display: flex; height: 100vh; }
    #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Branding Fix ── */
    .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; line-height: 1.1; color: var(--indigo); }
    
    /* ── Fixed Circular Numbers ── */
    .sc-stat-num {
      font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
      width: 40px; height: 40px; /* Fixed square box */
      display: flex; align-items: center; justify-content: center; /* Perfect centering */
      border-radius: 50%; border: 2px solid var(--border); margin: 0 auto 8px;
    }

    /* ── Team Summary Cards ── */
    #summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; overflow-y: auto; }
    .summary-card { background: var(--surface); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .sc-stats { display: flex; justify-content: space-around; text-align: center; margin-top: 15px; }

    /* ── Task Cards ── */
    #content { flex: 1; overflow-y: auto; padding: 20px; }
    #cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .task-card { background: white; border-radius: 12px; padding: 16px; border: 1px solid var(--border); position: relative; }
    .effort-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 5px; }

    /* ── UI Elements ── */
    .btn-primary { background: var(--indigo); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .header { height: 70px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    
    /* Modal Styles */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 16px; width: 400px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600; }
    .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
  </style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div style="background: var(--indigo); width:32px; height:32px; border-radius:8px;"></div>
      <span class="logo-text">Sharvii<br>Technologies</span>
    </div>
    <div style="padding:20px;">
      <label style="font-size:10px; font-weight:bold; color:#666;">LOGGED IN AS</label>
      <select id="user-select" style="width:100%; margin-top:5px; padding:8px; border-radius:6px;"></select>
    </div>
    <div id="team-list" style="padding:0 20px;"></div>
  </aside>

  <div id="main">
    <header class="header">
      <h2 id="view-title">Task Board</h2>
      <div style="display:flex; gap:10px;">
        <button class="btn-primary" onclick="switchView('board')">Board</button>
        <button class="btn-primary" onclick="switchView('summary')" style="background:#666;">Summary</button>
        <button class="btn-primary" onclick="showModal()" style="background:var(--violet);">+ Add Task</button>
      </div>
    </header>

    <div id="content">
      <div id="cards-grid"></div>
      <div id="summary-grid" style="display:none;"></div>
    </div>
  </div>
</div>

<div id="task-modal" class="modal">
  <div class="modal-content">
    <h3>Add New Task</h3>
    <div class="form-group">
      <label>TASK TITLE</label>
      <input type="text" id="task-title" placeholder="What needs to be done?">
    </div>
    <div class="form-group">
      <label>ASSIGN TO</label>
      <select id="task-assignee"></select>
    </div>
    <div style="display:flex; gap:10px;">
      <div class="form-group" style="flex:1;">
        <label>PRIORITY</label>
        <select id="task-priority">
          <option>Low</option>
          <option selected>Medium</option>
          <option>High</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;">
        <label>EFFORT</label>
        <select id="task-effort">
          <option>Low</option>
          <option selected>Medium</option>
          <option>High</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>DUE DATE</label>
      <input type="date" id="task-date">
    </div>
    <button class="btn-primary" style="width:100%;" onclick="saveTask()">Save Task</button>
    <button onclick="hideModal()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#666;">Cancel</button>
  </div>
</div>

<script>
  const team = ["Umesh", "Prabhu", "Mounika", "Chaithra", "Sarika", "Divya", "Hema"];
  let currentTasks = [];

  // Initialize
  window.onload = () => {
    const userDropdowns = [document.getElementById('user-select'), document.getElementById('task-assignee')];
    team.forEach(name => {
      userDropdowns.forEach(drop => {
        const opt = document.createElement('option');
        opt.value = opt.text = name;
        drop.add(opt);
      });
    });

    // Restore login
    const savedUser = localStorage.getItem('sharvii_user');
    if (savedUser) document.getElementById('user-select').value = savedUser;

    document.getElementById('user-select').onchange = (e) => {
      localStorage.setItem('sharvii_user', e.target.value);
    };

    fetchTasks();
    // Refresh every 30 seconds
    setInterval(fetchTasks, 30000);
  };

  async function fetchTasks() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tasks?select=*`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    currentTasks = await res.json();
    renderBoard();
    renderSummary();
  }

  function renderBoard() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = currentTasks.map(t => `
      <div class="task-card">
        <div style="font-weight:bold;">${t.title}</div>
        <div style="font-size:11px; color:#666; margin:5px 0;">Assigned to: ${t.assignee}</div>
        <div>
          <span class="effort-tag" style="background:#eee;">${t.priority} Priority</span>
          <span class="effort-tag" style="background:#eef1fd; color:var(--indigo);">Effort: ${t.effort_level}</span>
        </div>
        <div style="margin-top:10px; font-size:12px; border-top:1px solid #eee; pt:10px;">
          Status: <strong>${t.status}</strong>
        </div>
      </div>
    `).join('');
  }

  function renderSummary() {
    const grid = document.getElementById('summary-grid');
    grid.innerHTML = team.map(name => {
      const userTasks = currentTasks.filter(t => t.assignee === name);
      const todo = userTasks.filter(t => t.status === 'To Do').length;
      const prog = userTasks.filter(t => t.status === 'In Progress').length;
      const done = userTasks.filter(t => t.status === 'Done').length;

      return `
        <div class="summary-card">
          <h3 style="margin-bottom:10px;">${name}</h3>
          <div class="sc-stats">
            <div><div class="sc-stat-num" style="color:#666;">${todo}</div><small>To Do</small></div>
            <div><div class="sc-stat-num" style="color:var(--indigo); border-color:var(--indigo);">${prog}</div><small>In Progress</small></div>
            <div><div class="sc-stat-num" style="color:var(--green); border-color:var(--green);">${done}</div><small>Done</small></div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function saveTask() {
    const newTask = {
      title: document.getElementById('task-title').value,
      assignee: document.getElementById('task-assignee').value,
      priority: document.getElementById('task-priority').value,
      effort_level: document.getElementById('task-effort').value,
      due_date: document.getElementById('task-date').value || null,
      added_by: document.getElementById('user-select').value,
      status: 'To Do'
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/tasks`, {
      method: 'POST',
      headers: { 
        "apikey": SUPABASE_KEY, 
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=representation"
      },
      body: JSON.stringify(newTask)
    });

    if (res.ok) {
      hideModal();
      fetchTasks();
      alert("Task added successfully!");
    } else {
      const err = await res.json();
      alert("Error: " + err.message);
    }
  }

  function switchView(view) {
    document.getElementById('cards-grid').style.display = view === 'board' ? 'grid' : 'none';
    document.getElementById('summary-grid').style.display = view === 'summary' ? 'grid' : 'none';
    document.getElementById('view-title').innerText = view === 'board' ? 'Task Board' : 'Team Summary';
  }

  function showModal() { document.getElementById('task-modal').style.display = 'flex'; }
  function hideModal() { document.getElementById('task-modal').style.display = 'none'; }
</script>

</body>
</html>
